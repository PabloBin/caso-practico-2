---
- name: Esperar a que SSH esté disponible en la VM (reintentos cortos)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    vm_target: "{{ groups['vm'][0] }}"
    vm_ip: "{{ hostvars[vm_target].ansible_host | default(vm_target) }}"

  tasks:
    - name: Esperar a SSH en {{ vm_ip }}:22 (hasta ~60s)
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        timeout: 5
      register: ssh_ready
      retries: 12
      delay: 5
      until: ssh_ready is succeeded

- name: Preparar VM (Ubuntu) e instalar Podman
  hosts: vm
  become: true
  gather_facts: true

  roles:
    - vm_base