---
- name: Esperar a que SSH esté disponible en la VM (antes de conectar)
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../../group_vars/all/terraform.yml"

  tasks:
    - name: Esperar a SSH en {{ tf_vm_public_ip }}:22 (hasta ~60s)
      ansible.builtin.wait_for:
        host: "{{ tf_vm_public_ip }}"
        port: 22
        timeout: 5
      register: ssh_ready
      retries: 12
      delay: 5
      until: ssh_ready is succeeded

- name: Preparar VM (Ubuntu) e instalar Podman
  hosts: vm
  become: true
  gather_facts: true

  roles:
    - vm_base